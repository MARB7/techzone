<div class="login-container">
  <div class="login-box">
    <h1>Iniciar Sesión</h1>
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <!-- Error Alert -->
      <div *ngIf="error" class="alert alert-danger">
        {{ error }}
      </div>

      <!-- Username Field -->
      <div class="form-group">
        <label for="username">Usuario</label>
        <input
          type="text"
          id="username"
          formControlName="username"
          class="form-control"
          placeholder="Ingrese su usuario"
          [class.is-invalid]="submitted && f['username'].invalid"
        />
        <div *ngIf="submitted && f['username'].invalid" class="invalid-feedback">
          El usuario es requerido
        </div>
      </div>

      <!-- Password Field -->
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input
          type="password"
          id="password"
          formControlName="password"
          class="form-control"
          placeholder="Ingrese su contraseña"
          [class.is-invalid]="submitted && f['password'].invalid"
        />
        <div *ngIf="submitted && f['password'].invalid" class="invalid-feedback">
          <div *ngIf="f['password'].errors?.['required']">La contraseña es requerida</div>
          <div *ngIf="f['password'].errors?.['minlength']">La contraseña debe tener al menos 6 caracteres</div>
        </div>
      </div>

      <!-- Submit Button -->
      <button type="submit" class="btn btn-login" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        {{ loading ? 'Iniciando sesión...' : 'Iniciar Sesión' }}
      </button>
    </form>

    <!-- Register Link -->
    <p class="register-link">
      ¿No tienes cuenta? <a routerLink="/registro">Regístrate aquí</a>
    </p>
  </div>
</div>
