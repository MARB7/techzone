<section class="hero" (mouseenter)="onMouseEnter()" (mouseleave)="onMouseLeave()">

  @if (loading) {
  <div class="slide active">
    <div class="slide-bg slide-loading"></div>
    <div class="slide-content">
      <h2 class="slide-title">Cargando...</h2>
    </div>
  </div>
  } @else {

  <!-- Slides -->
  @for (slide of slides; track slide.id; let i = $index) {
    <div class="slide" [class.active]="i === currentIndex()" [class.inactive]="i !== currentIndex()">
      <div class="slide-bg" [style.background-image]="'url(' + slide.imagen + ')'">
        <div class="slide-overlay-bottom"></div>
        <div class="slide-overlay-sides"></div>
      </div>
      <div class="slide-content">

        <h2 class="slide-title">{{ slide.nombre }}</h2>
        <p class="slide-desc">{{ slide.descripcion }}</p>

        <a routerLink="/productos" class="btn btn-primary btn-buy">Comprar Ahora</a>
      </div>
    </div>
  }

  <!-- Prev / Next -->
  @if (slides.length > 1) {
  <button class="arrow arrow-left" (click)="prev()" aria-label="Anterior">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m15 18-6-6 6-6"/>
    </svg>
  </button>
  <button class="arrow arrow-right" (click)="next()" aria-label="Siguiente">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="m9 18 6-6-6-6"/>
    </svg>
  </button>

  <!-- Dots -->
  <div class="dots">
    @for (slide of slides; track slide.id; let i = $index) {
      <button
        class="dot"
        [class.dot-active]="i === currentIndex()"
        (click)="goTo(i)"
        [attr.aria-label]="'Ir al slide ' + (i + 1)"
      ></button>
    }
  </div>
  }

  }
</section>
